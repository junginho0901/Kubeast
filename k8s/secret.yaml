apiVersion: v1
kind: Secret
metadata:
  name: kube-assistant-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: "kubest"
  DATABASE_URL: "postgresql+asyncpg://kubest:kubest@postgres:5432/kubest"

  OPENAI_API_KEY: "change-me"
  # 이 placeholder 는 reset-and-deploy.sh 가 실행되면 즉시 랜덤값으로 patch 됩니다.
  # 직접 kubectl apply -k 로 배포하는 경우 반드시 별도 secret.local.yaml 로 덮어쓰세요.
  DEFAULT_ADMIN_PASSWORD: "change-me-do-not-use-in-prod"

  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""
