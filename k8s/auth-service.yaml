apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service
      containers:
        - name: auth-service
          image: kube-assistant/auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: kube-assistant-config
            - secretRef:
                name: kube-assistant-secrets
          volumeMounts:
            - name: auth-keys
              mountPath: /app/.keys
      volumes:
        - name: auth-keys
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  ports:
    - port: 8004
      targetPort: 8004
  selector:
    app: auth-service
