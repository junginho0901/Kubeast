apiVersion: ai.kube-assistant.io/v1alpha1
kind: ModelConfig
metadata:
  name: bedrock-default
  namespace: kube-assistant
spec:
  provider: bedrock
  # Use LiteLLM gateway for Bedrock routing
  baseURL: http://litellm:4000/v1
  # Replace with a valid Bedrock model ID
  # Examples:
  # - anthropic.claude-3-5-sonnet-20241022-v2
  # - anthropic.claude-3-5-haiku-20241022-v1
  # - amazon.nova-pro-v1:0
  model: bedrock/<MODEL_ID>
  bedrock:
    # Replace with your AWS region (e.g., us-east-1, us-west-2, ap-northeast-2)
    region: us-east-1
  enabled: true
  isDefault: false
